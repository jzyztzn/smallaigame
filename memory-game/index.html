<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🧠 记忆翻牌</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s;
      z-index: 100;
    }
    .back-btn:hover { background: rgba(255,255,255,0.2); }
    .container {
      max-width: 700px;
      width: 100%;
      text-align: center;
      margin-top: 60px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #ffeaa7, #fdcb6e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { color: rgba(255,255,255,0.6); margin-bottom: 20px; }
    
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 20px;
    }
    .stat {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 15px 25px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: #ffeaa7; }
    .stat-label { font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-top: 3px; }
    
    .difficulty-select {
      margin-bottom: 20px;
    }
    .difficulty-select button {
      padding: 10px 20px;
      margin: 0 5px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      transition: all 0.3s;
    }
    .difficulty-select button:hover,
    .difficulty-select button.active {
      background: #667eea;
      border-color: #667eea;
    }
    
    .game-board {
      display: grid;
      gap: 15px;
      justify-content: center;
      margin-bottom: 20px;
    }
    
    .card {
      width: 80px;
      height: 100px;
      perspective: 1000px;
      cursor: pointer;
    }
    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s;
    }
    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }
    .card-front, .card-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    .card-front {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: 2px solid rgba(255,255,255,0.2);
    }
    .card-back {
      background: linear-gradient(135deg, #ffeaa7, #fdcb6e);
      transform: rotateY(180deg);
    }
    .card.matched .card-back {
      background: linear-gradient(135deg, #4ecdc4, #44a08d);
      box-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
    }
    
    .controls {
      display: flex;
      gap: 15px;
      justify-content: center;
    }
    .btn {
      padding: 12px 30px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
    
    .victory-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .victory-overlay.show { display: flex; }
    .victory-content {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: 30px;
      padding: 50px;
      text-align: center;
      border: 2px solid #ffeaa7;
      animation: bounceIn 0.5s ease;
    }
    @keyframes bounceIn {
      0% { transform: scale(0); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .victory-title {
      font-size: 3rem;
      margin-bottom: 20px;
    }
    .victory-stats {
      font-size: 1.2rem;
      color: rgba(255,255,255,0.8);
      margin-bottom: 30px;
    }
    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 201;
    }
    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      animation: confetti-fall 3s ease-out forwards;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <a href="../index.html" class="back-btn">← 返回首页</a>
  
  <div class="container">
    <h1>🧠 记忆翻牌</h1>
    <p class="subtitle">考验你的记忆力，找到所有配对的卡片！</p>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="moves">0</div>
        <div class="stat-label">翻牌次数</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="pairs">0</div>
        <div class="stat-label">配对数</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="timer">0:00</div>
        <div class="stat-label">用时</div>
      </div>
    </div>

    <div class="difficulty-select">
      <button class="active" onclick="setDifficulty(8)">简单 (8张)</button>
      <button onclick="setDifficulty(12)">中等 (12张)</button>
      <button onclick="setDifficulty(16)">困难 (16张)</button>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="controls">
      <button class="btn btn-primary" onclick="startGame()">开始游戏</button>
    </div>
  </div>

  <div class="victory-overlay" id="victoryOverlay">
    <div class="victory-content">
      <div class="victory-title">🎉 恭喜通关！</div>
      <div class="victory-stats" id="victoryStats"></div>
      <button class="btn btn-primary" onclick="closeVictory()">再玩一次</button>
    </div>
  </div>

  <script>
    const emojis = ['🎮', '🎯', '🎲', '🎨', '🎭', '🎪', '🎢', '🎡', '🌟', '💎', '🔮', '🎁', '🏆', '⚡', '🔥', '💫'];
    
    let cards = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let moves = 0;
    let totalPairs = 4;
    let timerInterval = null;
    let seconds = 0;
    let gameStarted = false;

    function setDifficulty(count) {
      document.querySelectorAll('.difficulty-select button').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      totalPairs = count / 2;
      startGame();
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function createBoard() {
      const board = document.getElementById('gameBoard');
      const cols = totalPairs <= 8 ? 4 : totalPairs <= 12 ? 4 : 4;
      board.style.gridTemplateColumns = `repeat(${cols}, 80px)`;
      
      const selectedEmojis = emojis.slice(0, totalPairs);
      cards = shuffle([...selectedEmojis, ...selectedEmojis]);
      
      board.innerHTML = cards.map((emoji, i) => `
        <div class="card" data-index="${i}" onclick="flipCard(this)">
          <div class="card-inner">
            <div class="card-front">❓</div>
            <div class="card-back">${emoji}</div>
          </div>
        </div>
      `).join('');
    }

    function flipCard(card) {
      if (!gameStarted || card.classList.contains('flipped') || card.classList.contains('matched') || flippedCards.length >= 2) {
        return;
      }
      
      card.classList.add('flipped');
      flippedCards.push(card);

      if (flippedCards.length === 2) {
        moves++;
        document.getElementById('moves').textContent = moves;
        checkMatch();
      }
    }

    function checkMatch() {
      const [card1, card2] = flippedCards;
      const isMatch = cards[card1.dataset.index] === cards[card2.dataset.index];

      if (isMatch) {
        card1.classList.add('matched');
        card2.classList.add('matched');
        matchedPairs++;
        document.getElementById('pairs').textContent = matchedPairs;
        flippedCards = [];
        
        if (matchedPairs === totalPairs) {
          setTimeout(showVictory, 500);
        }
      } else {
        setTimeout(() => {
          card1.classList.remove('flipped');
          card2.classList.remove('flipped');
          flippedCards = [];
        }, 1000);
      }
    }

    function startGame() {
      matchedPairs = 0;
      moves = 0;
      seconds = 0;
      gameStarted = true;
      flippedCards = [];
      
      document.getElementById('moves').textContent = '0';
      document.getElementById('pairs').textContent = '0';
      document.getElementById('timer').textContent = '0:00';
      
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        seconds++;
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        document.getElementById('timer').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
      }, 1000);

      createBoard();
    }

    function showVictory() {
      clearInterval(timerInterval);
      document.getElementById('victoryStats').innerHTML = `
        用时: ${document.getElementById('timer').textContent}<br>
        翻牌次数: ${moves} 次
      `;
      document.getElementById('victoryOverlay').classList.add('show');
      createConfetti();
    }

    function closeVictory() {
      document.getElementById('victoryOverlay').classList.remove('show');
      startGame();
    }

    function createConfetti() {
      const container = document.createElement('div');
      container.className = 'confetti';
      document.body.appendChild(container);
      
      const colors = ['#f5576c', '#667eea', '#f093fb', '#4ecdc4', '#ffeaa7'];
      for (let i = 0; i < 50; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 2 + 's';
        container.appendChild(piece);
      }
      
      setTimeout(() => container.remove(), 5000);
    }
  </script>
</body>
</html>
