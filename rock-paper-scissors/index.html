<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✊ 石头剪刀布</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s;
      z-index: 100;
    }
    .back-btn:hover { background: rgba(255,255,255,0.2); }
    .container {
      max-width: 700px;
      width: 100%;
      text-align: center;
      margin-top: 60px;
      position: relative;
      z-index: 1;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #f093fb, #f5576c, #ffeaa7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: glow 2s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { filter: drop-shadow(0 0 10px rgba(240, 147, 251, 0.5)); }
      to { filter: drop-shadow(0 0 20px rgba(245, 87, 108, 0.8)); }
    }
    .subtitle { color: rgba(255,255,255,0.6); margin-bottom: 30px; font-size: 1.1rem; }
    
    /* 连胜火焰特效 */
    .streak-fire {
      position: fixed;
      top: 80px;
      right: 30px;
      font-size: 2rem;
      animation: fire 0.5s ease infinite;
      filter: drop-shadow(0 0 10px #ff6b00);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .streak-fire.show { opacity: 1; }
    @keyframes fire {
      0%, 100% { transform: scale(1) rotate(-5deg); }
      50% { transform: scale(1.2) rotate(5deg); }
    }
    
    .score-board {
      display: flex;
      justify-content: space-around;
      background: rgba(255,255,255,0.05);
      border-radius: 25px;
      padding: 25px;
      margin-bottom: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }
    .score-item { text-align: center; position: relative; }
    .score-label { font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-bottom: 5px; }
    .score-value { font-size: 2.5rem; font-weight: 900; transition: all 0.3s; }
    .score-item.win .score-value { color: #4ecdc4; text-shadow: 0 0 20px rgba(78, 205, 196, 0.5); }
    .score-item.lose .score-value { color: #f5576c; text-shadow: 0 0 20px rgba(245, 87, 108, 0.5); }
    .score-item.draw .score-value { color: #ffeaa7; text-shadow: 0 0 20px rgba(255, 234, 167, 0.5); }
    
    /* 计分动画 */
    .score-value.bump {
      animation: scoreBump 0.4s ease;
    }
    @keyframes scoreBump {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }
    
    /* 对战区域 */
    .battle-area {
      background: rgba(255,255,255,0.05);
      border-radius: 30px;
      padding: 40px;
      margin-bottom: 30px;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    
    /* 背景光效 */
    .battle-area::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(102,126,234,0.2) 0%, transparent 70%);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    
    .battle-hands {
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
    }
    .hand-wrapper {
      position: relative;
    }
    .hand-label {
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 10px;
    }
    .hand {
      font-size: 7rem;
      transition: all 0.3s;
      display: inline-block;
    }
    .hand.player { animation: playerEnter 0.5s ease; }
    .hand.ai { animation: aiEnter 0.5s ease 0.15s backwards; }
    
    @keyframes playerEnter {
      0% { transform: translateX(-100px) rotate(-180deg) scale(0); opacity: 0; }
      60% { transform: translateX(10px) rotate(10deg) scale(1.2); }
      100% { transform: translateX(0) rotate(0deg) scale(1); opacity: 1; }
    }
    @keyframes aiEnter {
      0% { transform: translateX(100px) rotate(180deg) scale(0); opacity: 0; }
      60% { transform: translateX(-10px) rotate(-10deg) scale(1.2); }
      100% { transform: translateX(0) rotate(0deg) scale(1); opacity: 1; }
    }
    
    /* 胜负闪烁 */
    .hand.winner {
      animation: winner 0.5s ease infinite;
      filter: drop-shadow(0 0 30px #ffeaa7);
    }
    .hand.loser {
      animation: loser 0.5s ease;
      opacity: 0.5;
    }
    @keyframes winner {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    @keyframes loser {
      0% { transform: scale(1); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
      100% { transform: scale(1); opacity: 0.5; }
    }
    
    .vs {
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: vsPulse 1s ease infinite;
    }
    @keyframes vsPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    /* 倒计时 */
    .countdown {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 8rem;
      font-weight: 900;
      color: #667eea;
      text-shadow: 0 0 50px rgba(102, 126, 234, 0.8);
      opacity: 0;
      z-index: 10;
    }
    .countdown.show {
      animation: countdownPop 0.8s ease forwards;
    }
    @keyframes countdownPop {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
      30% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      80% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    }
    
    .result-message {
      font-size: 2rem;
      font-weight: 700;
      padding: 20px 40px;
      border-radius: 20px;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .result-message.show {
      opacity: 1;
      transform: scale(1);
    }
    .result-message.win { 
      background: linear-gradient(135deg, #4ecdc4, #44a08d); 
      color: #fff;
      box-shadow: 0 10px 40px rgba(78, 205, 196, 0.5);
    }
    .result-message.lose { 
      background: linear-gradient(135deg, #f5576c, #ff6b6b); 
      color: #fff;
      box-shadow: 0 10px 40px rgba(245, 87, 108, 0.5);
    }
    .result-message.draw { 
      background: linear-gradient(135deg, #ffeaa7, #fdcb6e); 
      color: #1a1a2e;
      box-shadow: 0 10px 40px rgba(255, 234, 167, 0.5);
    }
    
    /* 选择按钮 */
    .choices {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin-bottom: 30px;
    }
    .choice-container { text-align: center; }
    .choice-btn {
      width: 120px;
      height: 120px;
      border-radius: 25px;
      background: rgba(255,255,255,0.05);
      border: 3px solid rgba(255,255,255,0.2);
      font-size: 4rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .choice-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    .choice-btn:hover::before {
      left: 100%;
    }
    .choice-btn:hover {
      transform: translateY(-10px) scale(1.1);
      background: rgba(255,255,255,0.15);
      border-color: #f093fb;
      box-shadow: 0 20px 40px rgba(240, 147, 251, 0.4);
    }
    .choice-btn:active {
      transform: scale(0.9);
    }
    .choice-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .choice-label {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      margin-top: 10px;
      font-weight: 500;
    }
    
    /* 历史记录 */
    .history {
      margin-top: 30px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .history h3 { font-size: 1rem; color: rgba(255,255,255,0.7); margin-bottom: 15px; }
    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .history-item {
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: historyPop 0.3s ease backwards;
    }
    @keyframes historyPop {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }
    .history-item.win { background: linear-gradient(135deg, #4ecdc4, #44a08d); color: #fff; }
    .history-item.lose { background: linear-gradient(135deg, #f5576c, #ff6b6b); color: #fff; }
    .history-item.draw { background: linear-gradient(135deg, #ffeaa7, #fdcb6e); color: #1a1a2e; }
    
    .reset-btn {
      margin-top: 25px;
      padding: 15px 40px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 15px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 5px 20px rgba(102,126,234,0.4);
    }
    .reset-btn:hover { 
      transform: translateY(-3px); 
      box-shadow: 0 10px 30px rgba(102,126,234,0.6);
    }
    
    /* 胜负粒子 */
    .particle-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: particleFly 1s ease-out forwards;
    }
    @keyframes particleFly {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
    }
    
    /* 闪电特效 */
    .lightning {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 99;
      opacity: 0;
    }
    .lightning.flash {
      animation: lightningFlash 0.2s ease;
    }
    @keyframes lightningFlash {
      0%, 100% { opacity: 0; background: transparent; }
      50% { opacity: 1; background: rgba(255, 255, 255, 0.3); }
    }
    
    /* 屏幕震动 */
    .shake {
      animation: screenShake 0.5s ease;
    }
    @keyframes screenShake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }
  </style>
</head>
<body>
  <div class="particle-container" id="particles"></div>
  <div class="lightning" id="lightning"></div>
  <div class="streak-fire" id="streakFire">🔥</div>
  
  <a href="../index.html" class="back-btn">← 返回首页</a>
  
  <div class="container" id="container">
    <h1>✊ 石头剪刀布</h1>
    <p class="subtitle">和 AI 来一场精彩的对决！</p>

    <div class="score-board">
      <div class="score-item win">
        <div class="score-label">胜利</div>
        <div class="score-value" id="wins">0</div>
      </div>
      <div class="score-item lose">
        <div class="score-label">失败</div>
        <div class="score-value" id="losses">0</div>
      </div>
      <div class="score-item draw">
        <div class="score-label">平局</div>
        <div class="score-value" id="draws">0</div>
      </div>
    </div>

    <div class="battle-area">
      <div class="countdown" id="countdown"></div>
      <div class="battle-hands">
        <div class="hand-wrapper">
          <div class="hand-label">你的选择</div>
          <div class="hand player" id="playerHand">❓</div>
        </div>
        <div class="vs">VS</div>
        <div class="hand-wrapper">
          <div class="hand-label">AI 选择</div>
          <div class="hand ai" id="aiHand">❓</div>
        </div>
      </div>
      <div class="result-message" id="resultMessage"></div>
    </div>

    <div class="choices">
      <div class="choice-container">
        <button class="choice-btn" id="rockBtn" onclick="play('rock')">✊</button>
        <div class="choice-label">石头</div>
      </div>
      <div class="choice-container">
        <button class="choice-btn" id="paperBtn" onclick="play('paper')">✋</button>
        <div class="choice-label">布</div>
      </div>
      <div class="choice-container">
        <button class="choice-btn" id="scissorsBtn" onclick="play('scissors')">✌️</button>
        <div class="choice-label">剪刀</div>
      </div>
    </div>

    <div class="history">
      <h3>📜 最近对战</h3>
      <div class="history-list" id="historyList"></div>
    </div>

    <button class="reset-btn" onclick="resetGame()">重新开始</button>
  </div>

  <script>
    const choices = ['rock', 'paper', 'scissors'];
    const hands = { rock: '✊', paper: '✋', scissors: '✌️' };
    const results = { win: '胜', lose: '负', draw: '平' };
    
    let state = { wins: 0, losses: 0, draws: 0, history: [], streak: 0, isPlaying: false };

    function setButtonsDisabled(disabled) {
      document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = disabled);
    }

    function showCountdown(callback) {
      const countdown = document.getElementById('countdown');
      let count = 3;
      
      const countInterval = setInterval(() => {
        countdown.textContent = count;
        countdown.classList.add('show');
        
        setTimeout(() => {
          countdown.classList.remove('show');
        }, 600);
        
        count--;
        
        if (count < 0) {
          clearInterval(countInterval);
          countdown.textContent = '⚔️';
          countdown.classList.add('show');
          setTimeout(() => {
            countdown.classList.remove('show');
            callback();
          }, 500);
        }
      }, 800);
    }

    function createParticles(x, y, color, count = 20) {
      const container = document.getElementById('particles');
      
      for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        
        const angle = (Math.PI * 2 / count) * i;
        const distance = 100 + Math.random() * 100;
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance;
        
        particle.style.cssText = `
          left: ${x}px;
          top: ${y}px;
          width: ${8 + Math.random() * 8}px;
          height: ${8 + Math.random() * 8}px;
          background: ${color};
          box-shadow: 0 0 10px ${color};
          --tx: ${tx}px;
          --ty: ${ty}px;
          animation-delay: ${Math.random() * 0.2}s;
        `;
        
        container.appendChild(particle);
        
        setTimeout(() => particle.remove(), 1200);
      }
    }

    function flashLightning() {
      const lightning = document.getElementById('lightning');
      lightning.classList.add('flash');
      setTimeout(() => lightning.classList.remove('flash'), 200);
    }

    function shakeScreen() {
      document.getElementById('container').classList.add('shake');
      setTimeout(() => document.getElementById('container').classList.remove('shake'), 500);
    }

    function play(playerChoice) {
      if (state.isPlaying) return;
      state.isPlaying = true;
      setButtonsDisabled(true);

      showCountdown(() => {
        // AI 每次都完全随机出拳
        const aiChoice = choices[Math.floor(Math.random() * 3)];
        let result;

        if (playerChoice === aiChoice) {
          result = 'draw';
          state.draws++;
          state.streak = 0;
        } else if (
          (playerChoice === 'rock' && aiChoice === 'scissors') ||
          (playerChoice === 'paper' && aiChoice === 'rock') ||
          (playerChoice === 'scissors' && aiChoice === 'paper')
        ) {
          result = 'win';
          state.wins++;
          state.streak++;
        } else {
          result = 'lose';
          state.losses++;
          state.streak = 0;
        }

        // 更新手型
        const playerHand = document.getElementById('playerHand');
        const aiHand = document.getElementById('aiHand');
        
        playerHand.textContent = hands[playerChoice];
        playerHand.className = 'hand player';
        aiHand.textContent = hands[aiChoice];
        aiHand.className = 'hand ai';

        // 添加胜负特效
        setTimeout(() => {
          if (result === 'win') {
            playerHand.classList.add('winner');
            createParticles(window.innerWidth / 4, window.innerHeight / 2, '#4ecdc4', 30);
          } else if (result === 'lose') {
            aiHand.classList.add('winner');
            playerHand.classList.add('loser');
            flashLightning();
            shakeScreen();
          } else {
            flashLightning();
          }
          
          // 显示结果
          const msg = document.getElementById('resultMessage');
          msg.style.display = 'inline-block';
          msg.className = `result-message ${result} show`;
          
          if (result === 'win') {
            const streakTexts = ['', '', '🔥 连胜 x2!', '🔥🔥 连胜 x3!', '🔥🔥🔥 连胜 x4!', '🔥🔥🔥🔥 超级连胜!'];
            msg.textContent = state.streak >= 3 ? `🎉 你赢了！${streakTexts[Math.min(state.streak, 5)]}` : '🎉 你赢了！';
            document.getElementById('streakFire').classList.add('show');
          } else if (result === 'lose') {
            msg.textContent = '😅 你输了！';
            document.getElementById('streakFire').classList.remove('show');
          } else {
            msg.textContent = '🤝 平局！';
            document.getElementById('streakFire').classList.remove('show');
          }

          // 更新分数动画
          const scoreEl = document.getElementById(result + 's');
          scoreEl.classList.add('bump');
          setTimeout(() => scoreEl.classList.remove('bump'), 400);

          // 更新历史
          state.history.unshift(result);
          if (state.history.length > 10) state.history.pop();
          
          updateUI();
          state.isPlaying = false;
          setButtonsDisabled(false);
        }, 300);
      });
    }

    function updateUI() {
      document.getElementById('wins').textContent = state.wins;
      document.getElementById('losses').textContent = state.losses;
      document.getElementById('draws').textContent = state.draws;

      const historyHTML = state.history.map((r, i) => 
        `<div class="history-item ${r}" style="animation-delay: ${i * 0.05}s">${results[r]}</div>`
      ).join('');
      document.getElementById('historyList').innerHTML = historyHTML;

      // 更新连胜显示
      if (state.streak >= 2) {
        document.getElementById('streakFire').classList.add('show');
      } else {
        document.getElementById('streakFire').classList.remove('show');
      }
    }

    function resetGame() {
      state = { wins: 0, losses: 0, draws: 0, history: [], streak: 0, isPlaying: false };
      document.getElementById('playerHand').textContent = '❓';
      document.getElementById('playerHand').className = 'hand player';
      document.getElementById('aiHand').textContent = '❓';
      document.getElementById('aiHand').className = 'hand ai';
      document.getElementById('resultMessage').style.display = '';
      document.getElementById('resultMessage').className = 'result-message';
      document.getElementById('streakFire').classList.remove('show');
      updateUI();
    }
  </script>
</body>
</html>
