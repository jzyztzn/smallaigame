<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✊ 石头剪刀布</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: #fff;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s;
      z-index: 100;
    }
    .back-btn:hover { background: rgba(255,255,255,0.2); }
    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
      margin-top: 60px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { color: rgba(255,255,255,0.6); margin-bottom: 30px; }
    .score-board {
      display: flex;
      justify-content: space-around;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 30px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .score-item { text-align: center; }
    .score-label { font-size: 0.9rem; color: rgba(255,255,255,0.5); margin-bottom: 5px; }
    .score-value { font-size: 2rem; font-weight: 700; }
    .score-item.win .score-value { color: #4ecdc4; }
    .score-item.lose .score-value { color: #f5576c; }
    .score-item.draw .score-value { color: #ffeaa7; }
    .battle-area {
      background: rgba(255,255,255,0.05);
      border-radius: 30px;
      padding: 40px;
      margin-bottom: 30px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .battle-hands {
      display: flex;
      justify-content: space-around;
      align-items: center;
      margin-bottom: 30px;
    }
    .hand {
      font-size: 6rem;
      transition: all 0.3s;
    }
    .hand.player { animation: bounceIn 0.5s ease; }
    .hand.ai { animation: bounceIn 0.5s ease 0.2s backwards; }
    @keyframes bounceIn {
      0% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    .vs {
      font-size: 2rem;
      font-weight: 900;
      color: rgba(255,255,255,0.3);
    }
    .result-message {
      font-size: 1.8rem;
      font-weight: 700;
      padding: 15px 30px;
      border-radius: 15px;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .result-message.win { background: linear-gradient(135deg, #4ecdc420, #44a08d40); border: 2px solid #4ecdc4; color: #4ecdc4; }
    .result-message.lose { background: linear-gradient(135deg, #f5576c20, #ff6b6b20); border: 2px solid #f5576c; color: #f5576c; }
    .result-message.draw { background: linear-gradient(135deg, #ffeaa720, #fdcb6e20); border: 2px solid #ffeaa7; color: #ffeaa7; }
    .choices {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }
    .choice-btn {
      width: 100px;
      height: 100px;
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      font-size: 3.5rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .choice-btn:hover {
      transform: translateY(-5px) scale(1.1);
      background: rgba(255,255,255,0.2);
      border-color: #f093fb;
      box-shadow: 0 10px 30px rgba(240, 147, 251, 0.3);
    }
    .choice-btn:active { transform: scale(0.95); }
    .choice-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      margin-top: 5px;
    }
    .choice-container { text-align: center; }
    .history {
      margin-top: 30px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .history h3 { font-size: 1rem; color: rgba(255,255,255,0.7); margin-bottom: 15px; }
    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .history-item {
      padding: 8px 15px;
      border-radius: 10px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .history-item.win { background: #4ecdc420; color: #4ecdc4; }
    .history-item.lose { background: #f5576c20; color: #f5576c; }
    .history-item.draw { background: #ffeaa720; color: #ffeaa7; }
    .reset-btn {
      margin-top: 20px;
      padding: 12px 30px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .reset-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
  </style>
</head>
<body>
  <a href="../index.html" class="back-btn">← 返回首页</a>
  
  <div class="container">
    <h1>✊ 石头剪刀布</h1>
    <p class="subtitle">和 AI 来一场精彩的对决！</p>

    <div class="score-board">
      <div class="score-item win">
        <div class="score-label">胜利</div>
        <div class="score-value" id="wins">0</div>
      </div>
      <div class="score-item lose">
        <div class="score-label">失败</div>
        <div class="score-value" id="losses">0</div>
      </div>
      <div class="score-item draw">
        <div class="score-label">平局</div>
        <div class="score-value" id="draws">0</div>
      </div>
    </div>

    <div class="battle-area">
      <div class="battle-hands">
        <div class="hand player" id="playerHand">❓</div>
        <div class="vs">VS</div>
        <div class="hand ai" id="aiHand">❓</div>
      </div>
      <div class="result-message" id="resultMessage" style="display: none;"></div>
    </div>

    <div class="choices">
      <div class="choice-container">
        <button class="choice-btn" onclick="play('rock')">✊</button>
        <div class="choice-label">石头</div>
      </div>
      <div class="choice-container">
        <button class="choice-btn" onclick="play('paper')">✋</button>
        <div class="choice-label">布</div>
      </div>
      <div class="choice-container">
        <button class="choice-btn" onclick="play('scissors')">✌️</button>
        <div class="choice-label">剪刀</div>
      </div>
    </div>

    <div class="history">
      <h3>📜 最近对战</h3>
      <div class="history-list" id="historyList"></div>
    </div>

    <button class="reset-btn" onclick="resetGame()">重新开始</button>
  </div>

  <script>
    const choices = ['rock', 'paper', 'scissors'];
    const hands = { rock: '✊', paper: '✋', scissors: '✌️' };
    const results = { win: '胜', lose: '负', draw: '平' };
    
    let state = { wins: 0, losses: 0, draws: 0, history: [] };

    function play(playerChoice) {
      const aiChoice = choices[Math.floor(Math.random() * 3)];
      let result;

      if (playerChoice === aiChoice) {
        result = 'draw';
        state.draws++;
      } else if (
        (playerChoice === 'rock' && aiChoice === 'scissors') ||
        (playerChoice === 'paper' && aiChoice === 'rock') ||
        (playerChoice === 'scissors' && aiChoice === 'paper')
      ) {
        result = 'win';
        state.wins++;
      } else {
        result = 'lose';
        state.losses++;
      }

      document.getElementById('playerHand').textContent = hands[playerChoice];
      document.getElementById('playerHand').className = 'hand player';
      document.getElementById('aiHand').textContent = hands[aiChoice];
      document.getElementById('aiHand').className = 'hand ai';

      const msg = document.getElementById('resultMessage');
      msg.style.display = 'block';
      msg.className = `result-message ${result}`;
      msg.textContent = result === 'win' ? '🎉 你赢了！' : result === 'lose' ? '😅 你输了！' : '🤝 平局！';

      state.history.unshift(result);
      if (state.history.length > 10) state.history.pop();
      
      updateUI();
    }

    function updateUI() {
      document.getElementById('wins').textContent = state.wins;
      document.getElementById('losses').textContent = state.losses;
      document.getElementById('draws').textContent = state.draws;

      const historyHTML = state.history.map(r => 
        `<div class="history-item ${r}">${results[r]}</div>`
      ).join('');
      document.getElementById('historyList').innerHTML = historyHTML;
    }

    function resetGame() {
      state = { wins: 0, losses: 0, draws: 0, history: [] };
      document.getElementById('playerHand').textContent = '❓';
      document.getElementById('aiHand').textContent = '❓';
      document.getElementById('resultMessage').style.display = 'none';
      updateUI();
    }
  </script>
</body>
</html>
