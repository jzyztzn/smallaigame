<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⌨️ 打字速度测试 - 小小刺猬</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .container {
      max-width: 750px;
      width: 100%;
      text-align: center;
      margin-top: 50px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #4ecdc4, #44a08d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: rgba(255,255,255,0.6);
      margin-bottom: 25px;
      font-size: 0.95rem;
    }

    /* 统计栏 */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .stat {
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius-md);
      padding: 15px 25px;
      border: 1px solid rgba(255,255,255,0.1);
      min-width: 100px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #4ecdc4;
    }

    .stat-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    /* 计时器 */
    .timer {
      font-size: 3.5rem;
      font-weight: 900;
      color: #ffeaa7;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255, 234, 167, 0.3);
    }

    .timer.warning {
      color: #f5576c;
      animation: timer-pulse 0.5s ease infinite;
    }

    @keyframes timer-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* 文本显示区 */
    .text-area {
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius-xl);
      padding: 25px;
      margin-bottom: 15px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .text-display {
      font-size: 1.4rem;
      line-height: 2.2;
      text-align: left;
      letter-spacing: 0.5px;
      word-break: break-word;
      font-family: 'Courier New', monospace;
    }

    .text-display .char {
      transition: all 0.05s;
      padding: 1px 0;
      border-radius: 2px;
    }

    .text-display .char.correct {
      color: #4ecdc4;
    }

    .text-display .char.wrong {
      color: #f5576c;
      background: rgba(245, 87, 108, 0.2);
      text-decoration: underline;
    }

    .text-display .char.current {
      background: #667eea;
      color: #fff;
      animation: char-blink 0.5s ease infinite;
    }

    @keyframes char-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .text-display .char.upcoming {
      color: rgba(255,255,255,0.35);
    }

    /* 用户输入显示区 */
    .typed-area {
      background: rgba(0,0,0,0.2);
      border-radius: var(--radius-md);
      padding: 15px 20px;
      margin-bottom: 15px;
      min-height: 60px;
      text-align: left;
    }

    .typed-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }

    .typed-text {
      font-size: 1.2rem;
      line-height: 1.6;
      color: #4ecdc4;
      font-family: 'Courier New', monospace;
      word-break: break-all;
      min-height: 30px;
    }

    .typed-text .correct {
      color: #4ecdc4;
    }

    .typed-text .wrong {
      color: #f5576c;
      text-decoration: line-through;
    }

    .typed-placeholder {
      color: rgba(255,255,255,0.3);
      font-style: italic;
    }

    /* 输入区 */
    .input-area {
      margin-bottom: 20px;
    }

    #typingInput {
      width: 100%;
      padding: 15px 20px;
      font-size: 1.3rem;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: var(--radius-md);
      color: #fff;
      outline: none;
      transition: all 0.3s;
      font-family: inherit;
    }

    #typingInput:focus {
      border-color: #4ecdc4;
      box-shadow: 0 0 20px rgba(78, 205, 196, 0.2);
    }

    #typingInput:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* 按钮组 */
    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* 结果面板 */
    .result-panel {
      display: none;
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius-xl);
      padding: 30px;
      margin-top: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .result-panel.show {
      display: block;
      animation: hg-slide-up 0.5s ease;
    }

    .result-title {
      font-size: 1.5rem;
      color: #4ecdc4;
      margin-bottom: 20px;
    }

    .result-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .result-stat {
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius-md);
      padding: 20px;
    }

    .result-stat .value {
      font-size: 2rem;
      font-weight: 700;
    }

    .result-stat .value.wpm { color: #4ecdc4; }
    .result-stat .value.accuracy { color: #ffeaa7; }
    .result-stat .value.chars { color: #667eea; }

    .result-stat .label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      margin-top: 5px;
    }

    /* 提示 */
    .tip {
      margin-top: 20px;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: var(--radius-md);
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
    }

    @media (max-width: 600px) {
      .stats-bar {
        flex-wrap: wrap;
        gap: 10px;
      }
      .stat {
        padding: 12px 18px;
        min-width: 80px;
      }
      .stat-value {
        font-size: 1.5rem;
      }
      .timer {
        font-size: 2.5rem;
      }
      .text-display {
        font-size: 1.2rem;
      }
      .result-stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <a href="../index.html" class="hg-back-btn" onclick="HedgehogLib.effects.showSpeedLines(); return true;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    返回首页
  </a>

  <div class="container">
    <h1>⌨️ 打字速度测试</h1>
    <p class="subtitle">用英文测试更准确！跟着小刺猬一起练习吧~</p>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="wpm">0</div>
        <div class="stat-label">字/分钟</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="accuracy">100%</div>
        <div class="stat-label">准确率</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="progress">0%</div>
        <div class="stat-label">进度</div>
      </div>
    </div>

    <div class="timer" id="timer">60</div>

    <div class="text-area">
      <div class="text-display" id="textDisplay"></div>
    </div>

    <!-- 用户输入显示 -->
    <div class="typed-area">
      <div class="typed-label">你输入的内容：</div>
      <div class="typed-text" id="typedText">
        <span class="typed-placeholder">开始输入后这里会显示...</span>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="typingInput" placeholder="点击「开始测试」后在此输入..." autocomplete="off" disabled>
    </div>

    <div class="btn-group">
      <button class="hg-btn hg-btn-primary" id="startBtn" onclick="startGame()">🚀 开始测试</button>
      <button class="hg-btn hg-btn-secondary" onclick="resetGame()">🔄 重新开始</button>
    </div>

    <div class="result-panel" id="resultPanel">
      <div class="result-title">🎉 测试完成！</div>
      <div class="result-stats">
        <div class="result-stat">
          <div class="value wpm" id="finalWpm">0</div>
          <div class="label">字/分钟 (WPM)</div>
        </div>
        <div class="result-stat">
          <div class="value accuracy" id="finalAccuracy">0%</div>
          <div class="label">准确率</div>
        </div>
        <div class="result-stat">
          <div class="value chars" id="finalChars">0</div>
          <div class="label">正确字符数</div>
        </div>
      </div>
    </div>

    <div class="tip">
      💡 提示：使用英文文本测试更准确，每个字符都会被计数。正确字符显示绿色，错误显示红色
    </div>
  </div>

  <script src="../shared/lib.js"></script>
  <script>
    // 英文文本库
    const texts = [
      "The quick brown fox jumps over the lazy dog. This pangram contains every letter of the alphabet at least once.",
      "Programming is the art of telling a computer what to do. Good code is like a good joke, it needs no explanation.",
      "Practice makes perfect. The more you type, the better you become. Keep practicing and you will improve every day.",
      "Success is not final, failure is not fatal. It is the courage to continue that counts in the end.",
      "The best way to predict the future is to create it. Every great developer you know got there by solving problems.",
      "Code is like humor. When you have to explain it, it is bad. Keep your code simple and easy to understand.",
      "First, solve the problem. Then, write the code. Planning before coding saves a lot of time and headaches.",
      "Learning never exhausts the mind. The more you learn, the more you realize how much you still do not know."
    ];

    // 游戏状态
    let state = {
      targetText: '',
      currentIndex: 0,
      correctCount: 0,
      totalTyped: 0,
      startTime: null,
      timerInterval: null,
      timeLeft: 60,
      gameActive: false,
      textLength: 0,
      typedHistory: [] // 记录每次输入及其正确性
    };

    // DOM元素
    const typingInput = document.getElementById('typingInput');
    const textDisplay = document.getElementById('textDisplay');
    const typedText = document.getElementById('typedText');
    const timerEl = document.getElementById('timer');
    const wpmEl = document.getElementById('wpm');
    const accuracyEl = document.getElementById('accuracy');
    const progressEl = document.getElementById('progress');
    const startBtn = document.getElementById('startBtn');
    const resultPanel = document.getElementById('resultPanel');

    // 初始化游戏
    function initGame() {
      state.targetText = HedgehogLib.utils.pick(texts);
      state.currentIndex = 0;
      state.correctCount = 0;
      state.totalTyped = 0;
      state.textLength = state.targetText.length;
      state.typedHistory = [];
      renderText();
      renderTypedText();
      updateStats();
    }

    // 渲染目标文本
    function renderText() {
      let html = '';
      for (let i = 0; i < state.targetText.length; i++) {
        let className = 'char';
        if (i < state.currentIndex) {
          className += ' correct';
        } else if (i === state.currentIndex) {
          className += ' current';
        } else {
          className += ' upcoming';
        }
        const char = state.targetText[i] === ' ' ? '&nbsp;' : escapeHtml(state.targetText[i]);
        html += `<span class="${className}">${char}</span>`;
      }
      textDisplay.innerHTML = html;
    }

    // 渲染用户输入的文本
    function renderTypedText() {
      if (state.typedHistory.length === 0) {
        typedText.innerHTML = '<span class="typed-placeholder">开始输入后这里会显示...</span>';
        return;
      }

      typedText.innerHTML = state.typedHistory.map(item => {
        const displayChar = item.char === ' ' ? '&nbsp;' : escapeHtml(item.char);
        const className = item.correct ? 'correct' : 'wrong';
        return `<span class="${className}">${displayChar}</span>`;
      }).join('');
    }

    // HTML转义
    function escapeHtml(char) {
      const div = document.createElement('div');
      div.textContent = char;
      return div.innerHTML;
    }

    // 更新统计
    function updateStats() {
      const progress = state.textLength > 0
        ? Math.round((state.currentIndex / state.textLength) * 100)
        : 0;
      progressEl.textContent = progress + '%';

      if (state.startTime && state.currentIndex > 0) {
        const elapsed = (Date.now() - state.startTime) / 1000 / 60;
        const wpm = Math.round((state.correctCount / 5) / elapsed);
        wpmEl.textContent = Math.min(wpm, 999);
      }

      if (state.totalTyped > 0) {
        const accuracy = Math.round((state.correctCount / state.totalTyped) * 100);
        accuracyEl.textContent = accuracy + '%';
      }
    }

    // 开始游戏
    function startGame() {
      initGame();
      state.gameActive = true;
      state.startTime = Date.now();
      state.timeLeft = 60;

      typingInput.disabled = false;
      typingInput.value = '';
      typingInput.focus();
      startBtn.disabled = true;
      resultPanel.classList.remove('show');
      timerEl.textContent = state.timeLeft;
      timerEl.classList.remove('warning');

      state.timerInterval = setInterval(() => {
        state.timeLeft--;
        timerEl.textContent = state.timeLeft;

        if (state.timeLeft <= 10) {
          timerEl.classList.add('warning');
        }

        updateStats();

        if (state.timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    // 结束游戏
    function endGame() {
      state.gameActive = false;
      clearInterval(state.timerInterval);
      typingInput.disabled = true;
      startBtn.disabled = false;
      timerEl.classList.remove('warning');

      const elapsed = 60 / 60;
      const wpm = Math.round((state.correctCount / 5) / elapsed);
      const accuracy = state.totalTyped > 0
        ? Math.round((state.correctCount / state.totalTyped) * 100)
        : 0;

      document.getElementById('finalWpm').textContent = wpm;
      document.getElementById('finalAccuracy').textContent = accuracy + '%';
      document.getElementById('finalChars').textContent = state.correctCount;

      resultPanel.classList.add('show');

      if (wpm >= 60) {
        HedgehogLib.effects.showConfetti();
      }
    }

    // 重置游戏
    function resetGame() {
      state.gameActive = false;
      clearInterval(state.timerInterval);
      state.currentIndex = 0;
      state.correctCount = 0;
      state.totalTyped = 0;
      state.startTime = null;
      state.timeLeft = 60;
      state.typedHistory = [];

      timerEl.textContent = '60';
      timerEl.classList.remove('warning');
      wpmEl.textContent = '0';
      accuracyEl.textContent = '100%';
      progressEl.textContent = '0%';

      typingInput.disabled = true;
      typingInput.value = '';
      startBtn.disabled = false;
      resultPanel.classList.remove('show');

      initGame();
    }

    // 输入处理
    typingInput.addEventListener('input', (e) => {
      if (!state.gameActive) return;

      const typed = e.target.value;

      if (typed.length === 0) return;

      const lastTyped = typed[typed.length - 1];
      const expected = state.targetText[state.currentIndex];

      // 清空输入框
      typingInput.value = '';

      // 记录输入
      const isCorrect = lastTyped === expected;
      state.typedHistory.push({ char: lastTyped, correct: isCorrect });

      if (isCorrect) {
        state.correctCount++;
        state.currentIndex++;

        if (state.currentIndex >= state.targetText.length) {
          renderText();
          renderTypedText();
          updateStats();
          endGame();
          return;
        }
      } else {
        state.totalTyped++;
        state.currentIndex++;

        if (state.currentIndex >= state.targetText.length) {
          renderText();
          renderTypedText();
          updateStats();
          endGame();
          return;
        }
      }

      state.totalTyped++;

      renderText();
      renderTypedText();
      updateStats();
    });

    // 初始化
    initGame();
  </script>
</body>
</html>
