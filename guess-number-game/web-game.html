<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 猜数字小游戏</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #f5576c);
      background-size: 300% 100%;
      animation: gradient 3s ease infinite;
    }

    @keyframes gradient {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.2em;
      color: #1a1a2e;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .header p {
      color: #666;
      font-size: 1rem;
    }

    .game-info {
      display: flex;
      justify-content: space-around;
      margin-bottom: 25px;
      padding: 20px;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8eb 100%);
      border-radius: 16px;
    }

    .info-item {
      text-align: center;
    }

    .info-item .label {
      font-size: 0.85em;
      color: #888;
      margin-bottom: 4px;
    }

    .info-item .value {
      font-size: 1.5em;
      font-weight: 700;
      color: #667eea;
    }

    .range-display {
      text-align: center;
      margin-bottom: 20px;
      padding: 15px;
      background: linear-gradient(135deg, #667eea20, #764ba220);
      border-radius: 12px;
    }

    .range-display span {
      font-weight: 600;
      color: #667eea;
    }

    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .input-group input {
      flex: 1;
      padding: 16px 20px;
      font-size: 1.2em;
      border: 3px solid #e1e1e1;
      border-radius: 12px;
      outline: none;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .input-group input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.2);
    }

    .input-group input:disabled {
      background: #f0f0f0;
      cursor: not-allowed;
    }

    .btn {
      padding: 16px 28px;
      font-size: 1.1em;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(102, 126, 234, 0.5);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(245, 87, 108, 0.5);
    }

    .message {
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      text-align: center;
      animation: slideIn 0.4s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-direction {
      font-size: 1.3em;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .message-distance {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .message.up {
      background: linear-gradient(135deg, #ff6b6b20, #ffa8a820);
      border: 2px solid #ff6b6b;
    }

    .message.up .message-direction {
      color: #e74c3c;
    }

    .message.down {
      background: linear-gradient(135deg, #4ecdc420, #45b7d120);
      border: 2px solid #4ecdc4;
    }

    .message.down .message-direction {
      color: #16a085;
    }

    .message.victory {
      background: linear-gradient(135deg, #f093fb40, #f5576c40);
      border: 3px solid #f5576c;
    }

    .message.victory .message-direction {
      font-size: 1.6em;
      color: #e74c3c;
    }

    .message.hint {
      background: linear-gradient(135deg, #667eea20, #764ba220);
      border: 2px solid #667eea;
    }

    .message.hint .message-direction {
      color: #667eea;
    }

    .progress-container {
      margin-bottom: 20px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.9em;
      color: #666;
    }

    .progress-bar {
      height: 12px;
      background: #e1e1e1;
      border-radius: 6px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4ecdc4, #44a08d);
      border-radius: 6px;
      transition: width 0.4s ease;
    }

    .guess-history {
      margin-top: 25px;
    }

    .guess-history h3 {
      font-size: 1em;
      color: #666;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-height: 150px;
      overflow-y: auto;
    }

    .history-item {
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 0.9em;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .history-item.too-high {
      background: #ff6b6b20;
      color: #e74c3c;
    }

    .history-item.too-low {
      background: #4ecdc420;
      color: #16a085;
    }

    .history-item.correct {
      background: #f5576c;
      color: white;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .hint-text {
      margin-top: 12px;
      padding: 12px 16px;
      background: #f8f9fa;
      border-radius: 10px;
      color: #555;
      font-size: 0.95em;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .settings {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 2px dashed #e1e1e1;
    }

    .settings-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #888;
      cursor: pointer;
      font-size: 0.9em;
      transition: color 0.3s;
    }

    .settings-toggle:hover {
      color: #667eea;
    }

    .settings-content {
      margin-top: 15px;
      display: none;
    }

    .settings-content.show {
      display: block;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 12px;
    }

    .settings-row label {
      flex: 1;
      color: #555;
    }

    .settings-row input[type="number"] {
      width: 80px;
      padding: 8px 12px;
      border: 2px solid #e1e1e1;
      border-radius: 8px;
      font-size: 1em;
      text-align: center;
    }

    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
    }

    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #f5576c;
      animation: confetti-fall 3s ease-out forwards;
    }

    @keyframes confetti-fall {
      0% {
        transform: translateY(-100vh) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }

    .emoji-bounce {
      animation: bounce 0.6s ease;
    }

    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    @media (max-width: 500px) {
      .container {
        padding: 25px;
      }

      .header h1 {
        font-size: 1.8em;
      }

      .input-group {
        flex-direction: column;
      }

      .input-group .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎯 猜数字</h1>
      <p id="subtitle">看看你能猜中几个数字！</p>
    </div>

    <div class="game-info">
      <div class="info-item">
        <div class="label">剩余次数</div>
        <div class="value" id="attempts">10</div>
      </div>
      <div class="info-item">
        <div class="label">已猜次数</div>
        <div class="value" id="guessed">0</div>
      </div>
      <div class="info-item">
        <div class="label">历史最佳</div>
        <div class="value" id="best">-</div>
      </div>
    </div>

    <div class="range-display">
      请猜 <span id="minRange">1</span> 到 <span id="maxRange">100</span> 之间的数字
    </div>

    <div class="progress-container">
      <div class="progress-label">
        <span>猜测进度</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <div class="input-group">
      <input type="number" id="guessInput" placeholder="输入你的猜测..." min="1" max="100" autofocus>
      <button class="btn btn-primary" id="guessBtn">猜测</button>
    </div>

    <div id="messageArea"></div>

    <div class="guess-history" id="historySection" style="display: none;">
      <h3>📜 猜测历史</h3>
      <div class="history-list" id="historyList"></div>
    </div>

    <div class="settings">
      <div class="settings-toggle" id="settingsToggle">
        <span>⚙️</span>
        <span>游戏设置</span>
      </div>
      <div class="settings-content" id="settingsContent">
        <div class="settings-row">
          <label>最小数字</label>
          <input type="number" id="settingMin" value="1" min="1" max="999">
        </div>
        <div class="settings-row">
          <label>最大数字</label>
          <input type="number" id="settingMax" value="100" min="2" max="1000">
        </div>
        <div class="settings-row">
          <label>最大次数</label>
          <input type="number" id="settingAttempts" value="10" min="3" max="20">
        </div>
        <button class="btn btn-secondary" id="applySettings" style="width: 100%; margin-top: 10px;">
          应用设置并重新开始
        </button>
      </div>
    </div>
  </div>

  <script>
    // 游戏配置
    let config = {
      min: 1,
      max: 100,
      maxAttempts: 10
    };

    // 游戏状态
    let state = {
      target: 0,
      attempts: 0,
      guessed: 0,
      history: [],
      bestScore: localStorage.getItem('guessGameBest') ? parseInt(localStorage.getItem('guessGameBest')) : null,
      gameOver: false
    };

    // 多样化提示语
    const hints = {
      veryClose: [
        "哇！太接近了！只差一丁点儿~",
        "就差一点点！再仔细想想！",
        "近在咫尺啊！再猜一次！",
        "叮咚~ 答案就在旁边哦！",
        "太棒了，超级接近了！",
        "哇哦！几乎猜到了呢！",
        "好厉害！就差最后一步了！",
        "就在附近啦，加油！"
      ],
      close: [
        "不错不错，比较接近了！",
        "有进步！再接再厉！",
        "挺近的了，继续努力！",
        "方向对了！再来一次！",
        "嗯，这个距离差不多了~",
        "猜得不错，越来越近了！",
        "对头对头，就是这个方向！",
        "有感觉了吧？继续猜！"
      ],
      medium: [
        "还差一点距离，加油！",
        "嗯...不算太远，再想想！",
        "中等距离，还要继续努力！",
        "有点感觉了，但还差点~",
        "方向差不多，但距离还远！",
        "比上次好一点点啦！",
        "别急，慢慢缩小范围~",
        "继续保持，这个思路没错！"
      ],
      far: [
        "嗯...差得有点远哦！",
        "有点跑偏了，再想想！",
        "猜得有点离谱，再来！",
        "哎呀，偏离目标啦~",
        "方向不太对呢！",
        "这个距离...emm...再大胆点试试？",
        "跑远了！换个思路吧！",
        "不太对哦，要不要再考虑下？"
      ],
      veryFar: [
        "哈哈，差得老远了！",
        "这...有点太离谱了吧！",
        "完全不对方向呢~",
        "晕，猜到外太空去了！",
        "emmm...建议换个思路？",
        "是不是在故意逗我玩？",
        "这个差距...有点大哦！",
        "走错片场了吧这是！"
      ],
      tooHigh: [
        "猜得太大了，往小一点试试！",
        "哎呀，这个数太大了~",
        "太大啦！往小的方向猜！",
        "高了高了，要降降温！",
        "数字太大了，猜小一点！",
        "别那么激进，降一降~",
        "高了高了，猜个更小的！",
        "往下降降，别那么冲！"
      ],
      tooLow: [
        "猜得太小啦，往大一点试试！",
        "这个数有点小，往上走走~",
        "太小了！猜个更大的！",
        "低了低了，要升温！",
        "往大点猜，别那么保守！",
        "数字太小啦，大胆点！",
        "低了低了，往上涨涨~",
        "太小了，猜个更大的数！"
      ]
    };

    const victoryMessages = [
      "🎉 恭喜你！猜对了！你就是预言家！",
      "🏆 太厉害了！你是天才！",
      "✨ 命中注定！太棒了！",
      "🎊 猜对啦！完美通关！",
      "🌟 神机妙算！你赢了！",
      "🎯 一击即中！大吉大利！",
      "🎁 恭喜发财！你是赢家！",
      "🔮 未卜先知！你太厉害了！"
    ];

    // DOM 元素
    const guessInput = document.getElementById('guessInput');
    const guessBtn = document.getElementById('guessBtn');
    const attemptsEl = document.getElementById('attempts');
    const guessedEl = document.getElementById('guessed');
    const bestEl = document.getElementById('best');
    const messageArea = document.getElementById('messageArea');
    const historySection = document.getElementById('historySection');
    const historyList = document.getElementById('historyList');
    const minRangeEl = document.getElementById('minRange');
    const maxRangeEl = document.getElementById('maxRange');
    const progressFill = document.getElementById('progressFill');
    const progressPercent = document.getElementById('progressPercent');
    const settingsToggle = document.getElementById('settingsToggle');
    const settingsContent = document.getElementById('settingsContent');
    const applySettingsBtn = document.getElementById('applySettings');

    // 工具函数
    function randomHint(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function getDistanceHint(diff) {
      if (diff <= 1) return 'veryClose';
      if (diff <= Math.floor((config.max - config.min) * 0.05)) return 'close';
      if (diff <= Math.floor((config.max - config.min) * 0.15)) return 'medium';
      if (diff <= Math.floor((config.max - config.min) * 0.30)) return 'far';
      return 'veryFar';
    }

    function getHint(guess, target) {
      const diff = Math.abs(guess - target);
      const distanceHint = getDistanceHint(diff);
      const directionHint = guess > target ? 'tooHigh' : 'tooLow';
      return `${randomHint(hints[directionHint])} ${randomHint(hints[distanceHint])}`;
    }

    function updateUI() {
      attemptsEl.textContent = state.attempts;
      guessedEl.textContent = state.guessed;
      minRangeEl.textContent = config.min;
      maxRangeEl.textContent = config.max;

      if (state.bestScore !== null) {
        bestEl.textContent = state.bestScore;
      }

      guessInput.min = config.min;
      guessInput.max = config.max;
    }

    function showMessage(direction, distance, hint, isVictory = false) {
      let html = `<div class="message ${direction} ${isVictory ? 'victory' : ''}">`;

      if (isVictory) {
        html += `<div class="message-direction">🎉 ${randomHint(victoryMessages)}</div>`;
        html += `<div class="message-distance">用了 ${state.guessed} 次就猜到了！</div>`;
      } else {
        html += `<div class="message-direction">${direction === 'up' ? '⬆️' : '⬇️'} ${hint.split('！')[0]}！</div>`;
        html += `<div class="message-distance">${hint.split('！').slice(1).join('！').trim() || hint}</div>`;
      }

      html += '</div>';
      messageArea.innerHTML = html;

      if (!isVictory) {
        messageArea.innerHTML += `<div class="hint-text">${hint}</div>`;
      }
    }

    function addToHistory(guess, direction) {
      historySection.style.display = 'block';
      const item = document.createElement('div');
      item.className = `history-item ${direction}`;
      item.innerHTML = `${guess} <span>${direction === 'too-high' ? '⬆️' : '⬇️'}</span>`;
      historyList.appendChild(item);
    }

    function updateProgress() {
      const range = config.max - config.min;
      const progress = Math.min(100, Math.round((state.guessed / config.maxAttempts) * 100));
      progressFill.style.width = `${progress}%`;
      progressPercent.textContent = `${progress}%`;
    }

    function createConfetti() {
      const container = document.createElement('div');
      container.className = 'confetti';
      document.body.appendChild(container);

      const colors = ['#f5576c', '#667eea', '#f093fb', '#4ecdc4', '#ffeaa7', '#dfe6e9'];

      for (let i = 0; i < 100; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = `${Math.random() * 100}vw`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = `${Math.random() * 2}s`;
        piece.style.animationDuration = `${2 + Math.random() * 2}s`;
        container.appendChild(piece);
      }

      setTimeout(() => container.remove(), 5000);
    }

    function victory() {
      state.gameOver = true;
      guessInput.disabled = true;
      guessBtn.disabled = true;

      showMessage(null, null, null, true);
      createConfetti();

      if (state.bestScore === null || state.guessed < state.bestScore) {
        state.bestScore = state.guessed;
        localStorage.setItem('guessGameBest', state.bestScore);
        bestEl.textContent = state.bestScore;
      }

      setTimeout(() => {
        if (confirm(`🎊 太棒了！你用了 ${state.guessed} 次就猜到了！\n\n要再来一局吗？`)) {
          initGame();
        }
      }, 500);
    }

    function defeat() {
      state.gameOver = true;
      guessInput.disabled = true;
      guessBtn.disabled = true;

      messageArea.innerHTML = `
        <div class="message" style="background: linear-gradient(135deg, #ff6b6b20, #ffa8a820); border: 2px solid #ff6b6b;">
          <div class="message-direction" style="color: #e74c3c;">😢 游戏结束！</div>
          <div class="message-distance">正确答案是 <strong>${state.target}</strong></div>
        </div>
      `;

      setTimeout(() => {
        if (confirm(`😅 遗憾！正确答案是 ${state.target}\n\n要再来一局吗？`)) {
          initGame();
        }
      }, 500);
    }

    function makeGuess() {
      if (state.gameOver) return;

      const value = parseInt(guessInput.value);

      if (isNaN(value) || value < config.min || value > config.max) {
        alert(`请输入 ${config.min} 到 ${config.max} 之间的数字！`);
        return;
      }

      state.guessed++;
      state.attempts = config.maxAttempts - state.guessed;
      updateUI();
      updateProgress();

      const diff = Math.abs(value - state.target);

      if (value === state.target) {
        addToHistory(value, 'correct');
        victory();
        return;
      }

      const direction = value > state.target ? 'up' : 'down';
      const hint = getHint(value, state.target);

      addToHistory(value, direction === 'up' ? 'too-high' : 'too-low');
      showMessage(direction, diff, hint);

      guessInput.value = '';
      guessInput.focus();

      if (state.guessed >= config.maxAttempts) {
        defeat();
      }
    }

    function initGame() {
      state.target = Math.floor(Math.random() * (config.max - config.min + 1)) + config.min;
      state.attempts = config.maxAttempts;
      state.guessed = 0;
      state.history = [];
      state.gameOver = false;

      guessInput.disabled = false;
      guessBtn.disabled = false;
      guessInput.value = '';
      messageArea.innerHTML = '';
      historyList.innerHTML = '';
      historySection.style.display = 'none';

      updateUI();
      updateProgress();

      guessInput.min = config.min;
      guessInput.max = config.max;
      guessInput.focus();
    }

    function applySettings() {
      const newMin = parseInt(document.getElementById('settingMin').value) || 1;
      const newMax = parseInt(document.getElementById('settingMax').value) || 100;
      const newAttempts = parseInt(document.getElementById('settingAttempts').value) || 10;

      if (newMin >= newMax) {
        alert('最小值必须小于最大值！');
        return;
      }

      if (newAttempts < 3 || newAttempts > 20) {
        alert('尝试次数必须在 3-20 之间！');
        return;
      }

      config.min = newMin;
      config.max = newMax;
      config.maxAttempts = newAttempts;

      settingsContent.classList.remove('show');
      initGame();
    }

    // 事件监听
    guessBtn.addEventListener('click', makeGuess);

    guessInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        makeGuess();
      }
    });

    settingsToggle.addEventListener('click', () => {
      settingsContent.classList.toggle('show');
    });

    applySettingsBtn.addEventListener('click', applySettings);

    // 初始化
    initGame();
  </script>
</body>
</html>
