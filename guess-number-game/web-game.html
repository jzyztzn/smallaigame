<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 猜数字 - 小小刺猬</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
  <style>
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      width: 100%;
      text-align: center;
      margin-top: 50px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: rgba(255,255,255,0.6);
      margin-bottom: 25px;
      font-size: 0.95rem;
    }

    /* 统计栏 */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .stat {
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius-md);
      padding: 12px 20px;
      border: 1px solid rgba(255,255,255,0.1);
      min-width: 90px;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #667eea;
    }

    .stat-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    /* 游戏区域 */
    .game-area {
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius-xl);
      padding: 25px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* 范围显示 */
    .range-display {
      background: rgba(102, 126, 234, 0.15);
      border-radius: var(--radius-md);
      padding: 15px;
      margin-bottom: 20px;
    }

    .range-label {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 8px;
    }

    .range-values {
      font-size: 1.8rem;
      font-weight: 700;
    }

    .range-values .min { color: #4ecdc4; }
    .range-values .max { color: #f5576c; }
    .range-values .arrow {
      color: rgba(255,255,255,0.4);
      margin: 0 15px;
    }

    /* 键盘输入区 */
    .input-section {
      margin-bottom: 20px;
    }

    .input-section label {
      display: block;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 10px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    #guessInput {
      width: 150px;
      padding: 14px 20px;
      font-size: 1.3rem;
      font-weight: 700;
      background: rgba(255,255,255,0.1);
      border: 3px solid rgba(255,255,255,0.2);
      border-radius: var(--radius-md);
      color: #fff;
      text-align: center;
      outline: none;
      transition: all 0.3s;
    }

    #guessInput:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.2);
    }

    #guessInput::placeholder {
      color: rgba(255,255,255,0.3);
      font-weight: 400;
    }

    /* 按钮网格 - 作为辅助 */
    .quick-btns {
      margin-bottom: 20px;
    }

    .quick-btns label {
      display: block;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 10px;
    }

    .number-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
    }

    .num-btn {
      aspect-ratio: 1;
      min-width: 35px;
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .num-btn:hover:not(.disabled) {
      background: #667eea;
      border-color: #667eea;
      transform: scale(1.05);
    }

    .num-btn:active:not(.disabled) {
      transform: scale(0.95);
    }

    .num-btn.disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    .num-btn.selected {
      background: #4ecdc4;
      border-color: #4ecdc4;
    }

    /* 历史记录 */
    .history-section {
      margin-top: 20px;
    }

    .history-label {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 10px;
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .history-item {
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-size: 0.9rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .history-item.high {
      background: rgba(245, 87, 108, 0.2);
      color: #f5576c;
      border: 1px solid rgba(245, 87, 108, 0.3);
    }

    .history-item.low {
      background: rgba(78, 205, 196, 0.2);
      color: #4ecdc4;
      border: 1px solid rgba(78, 205, 196, 0.3);
    }

    /* 结果消息 */
    .result-message {
      padding: 20px;
      border-radius: var(--radius-md);
      margin-top: 20px;
      font-size: 1.1rem;
      font-weight: 600;
      display: none;
    }

    .result-message.show {
      display: block;
      animation: hg-slide-up 0.3s ease;
    }

    /* 提示 */
    .hint-text {
      margin-top: 10px;
      padding: 10px 15px;
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      color: rgba(255,255,255,0.7);
    }

    /* 设置面板 */
    .settings-section {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px dashed rgba(255,255,255,0.1);
    }

    .settings-toggle {
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 0.9rem;
      transition: color 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .settings-toggle:hover {
      color: #667eea;
    }

    .settings-panel {
      margin-top: 15px;
      padding: 15px;
      background: rgba(255,255,255,0.03);
      border-radius: var(--radius-md);
      display: none;
    }

    .settings-panel.show {
      display: block;
    }

    .settings-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .settings-row label {
      min-width: 70px;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
    }

    .settings-row input {
      width: 80px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: var(--radius-sm);
      color: #fff;
      text-align: center;
      font-size: 0.95rem;
    }

    @media (max-width: 500px) {
      .number-grid {
        grid-template-columns: repeat(8, 1fr);
      }
      .num-btn {
        min-width: 30px;
        font-size: 0.8rem;
      }
      .stats-bar { gap: 10px; }
      .stat { padding: 10px 12px; min-width: 75px; }
      #guessInput { width: 120px; font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <a href="../index.html" class="hg-back-btn" onclick="HedgehogLib.effects.showSpeedLines(); return true;">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
    返回首页
  </a>

  <div class="container">
    <h1>🎯 猜数字</h1>
    <p class="subtitle">小刺猬想了一个数字，快来猜猜看！</p>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="remaining">10</div>
        <div class="stat-label">剩余次数</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="guessed">0</div>
        <div class="stat-label">已猜次数</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="best">-</div>
        <div class="stat-label">最佳成绩</div>
      </div>
    </div>

    <div class="game-area">
      <div class="range-display">
        <p class="range-label">小刺猬想的数字在范围内：</p>
        <div class="range-values">
          <span class="min" id="minRange">1</span>
          <span class="arrow">~</span>
          <span class="max" id="maxRange">100</span>
        </div>
      </div>

      <!-- 键盘输入区 -->
      <div class="input-section">
        <label>输入你的猜测：</label>
        <div class="input-group">
          <input type="number" id="guessInput" placeholder="1-100" min="1" max="100" autofocus>
          <button class="hg-btn hg-btn-primary" onclick="submitGuess()">猜测</button>
        </div>
      </div>

      <!-- 快速选择按钮 -->
      <div class="quick-btns">
        <label>或点击快速选择：</label>
        <div class="number-grid" id="numberGrid"></div>
      </div>

      <div class="history-section">
        <p class="history-label">猜测历史：</p>
        <div class="history-list" id="historyList">
          <span style="color: rgba(255,255,255,0.3);">还没有猜测...</span>
        </div>
      </div>

      <div class="result-message" id="resultMessage"></div>
      <div class="hint-text" id="hintText"></div>
    </div>

    <!-- 设置 -->
    <div class="settings-section">
      <div class="settings-toggle" onclick="toggleSettings()">
        <span>⚙️</span>
        <span>游戏设置</span>
      </div>
      <div class="settings-panel" id="settingsPanel">
        <div class="settings-row">
          <label>最小值：</label>
          <input type="number" id="settingMin" value="1" min="1">
        </div>
        <div class="settings-row">
          <label>最大值：</label>
          <input type="number" id="settingMax" value="100" min="2">
        </div>
        <div class="settings-row">
          <label>尝试次数：</label>
          <input type="number" id="settingAttempts" value="10" min="3" max="20">
        </div>
        <button class="hg-btn hg-btn-primary hg-w-full" onclick="applySettings()" style="margin-top: 10px;">
          应用设置
        </button>
      </div>
    </div>
  </div>

  <script src="../shared/lib.js"></script>
  <script>
    // 游戏配置
    let config = {
      min: 1,
      max: 100,
      maxAttempts: 10
    };

    // 游戏状态
    let state = {
      target: 0,
      attemptsLeft: 10,
      guessedCount: 0,
      history: [],
      bestScore: HedgehogLib.storage.get('guessBest'),
      gameOver: false
    };

    // 提示语
    const hints = {
      high: ['太大了！往小一点~', '高了高了，降温一下！', '猜太大了，再小一点！'],
      low: ['太小了！往大一点~', '低了低了，升温一下！', '猜太小了，再大一点！'],
      veryClose: ['哇！太接近了！！', '就差一点点！', '近在咫尺啊！']
    };

    // 初始化
    function initGame() {
      state.target = HedgehogLib.utils.random(config.min, config.max);
      state.attemptsLeft = config.maxAttempts;
      state.guessedCount = 0;
      state.history = [];
      state.gameOver = false;

      renderNumberGrid();
      updateUI();
      updateBestDisplay();
      clearResult();

      document.getElementById('guessInput').min = config.min;
      document.getElementById('guessInput').max = config.max;
      document.getElementById('guessInput').placeholder = `${config.min}-${config.max}`;
      document.getElementById('guessInput').value = '';
      document.getElementById('guessInput').focus();
    }

    // 渲染数字网格
    function renderNumberGrid() {
      const grid = document.getElementById('numberGrid');
      const numbers = [];

      for (let i = config.min; i <= config.max; i++) {
        numbers.push(i);
      }

      grid.innerHTML = numbers.map(num => {
        const isDisabled = isNumberDisabled(num);
        return `<button class="num-btn ${isDisabled ? 'disabled' : ''}"
                        onclick="makeGuess(${num})"
                        ${isDisabled ? 'disabled' : ''}>${num}</button>`;
      }).join('');
    }

    // 检查数字是否禁用
    function isNumberDisabled(num) {
      if (state.gameOver) return true;
      for (const item of state.history) {
        if (item.number === num) return true;
      }
      return false;
    }

    // 执行猜测
    function makeGuess(num) {
      if (state.gameOver) return;
      if (isNumberDisabled(num)) return;

      state.guessedCount++;
      state.attemptsLeft = config.maxAttempts - state.guessedCount;

      let hint = '';
      let type = '';

      if (num > state.target) {
        type = 'high';
        hint = HedgehogLib.utils.pick(hints.high);
      } else if (num < state.target) {
        type = 'low';
        hint = HedgehogLib.utils.pick(hints.low);
      }

      const diff = Math.abs(num - state.target);
      if (diff <= 3 && num !== state.target) {
        hint = HedgehogLib.utils.pick(hints.veryClose) + ' ' + hint;
      }

      state.history.push({ number: num, type: type, diff: diff });

      if (num === state.target) {
        victory();
        return;
      }

      if (state.attemptsLeft <= 0) {
        defeat();
        return;
      }

      renderNumberGrid();
      updateUI();
      updateHistoryDisplay();
      showHint(hint);
    }

    // 键盘提交
    function submitGuess() {
      const input = document.getElementById('guessInput');
      const num = parseInt(input.value);

      if (isNaN(num) || num < config.min || num > config.max) {
        alert(`请输入 ${config.min} 到 ${config.max} 之间的数字！`);
        return;
      }

      makeGuess(num);
      input.value = '';
      input.focus();
    }

    // 键盘事件
    document.getElementById('guessInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        submitGuess();
      }
    });

    // 胜利
    function victory() {
      state.gameOver = true;

      const isNewBest = state.bestScore === null || state.guessedCount < state.bestScore;
      if (isNewBest) {
        state.bestScore = state.guessedCount;
        HedgehogLib.storage.set('guessBest', state.bestScore);
        updateBestDisplay();
      }

      showResult(`🎉 恭喜你！只用了 ${state.guessedCount} 次就找到了！${isNewBest ? '🏆 新纪录！' : ''}`, 'success');
      HedgehogLib.effects.showConfetti();
      renderNumberGrid();

      setTimeout(() => {
        if (confirm(`太棒了！你用了 ${state.guessedCount} 次就猜到了！\n\n要再来一局吗？`)) {
          initGame();
        }
      }, 500);
    }

    // 失败
    function defeat() {
      state.gameOver = true;
      showResult(`😢 游戏结束！正确答案是 <strong>${state.target}</strong>`, 'error');
      renderNumberGrid();

      setTimeout(() => {
        if (confirm(`遗憾！正确答案是 ${state.target}\n\n要再来一局吗？`)) {
          initGame();
        }
      }, 500);
    }

    // 更新UI
    function updateUI() {
      document.getElementById('remaining').textContent = state.attemptsLeft;
      document.getElementById('guessed').textContent = state.guessedCount;

      let currentMin = config.min;
      let currentMax = config.max;

      for (const item of state.history) {
        if (item.type === 'high' && item.number < currentMax) {
          currentMax = item.number - 1;
        }
        if (item.type === 'low' && item.number > currentMin) {
          currentMin = item.number + 1;
        }
      }

      document.getElementById('minRange').textContent = currentMin;
      document.getElementById('maxRange').textContent = currentMax;
    }

    // 更新历史
    function updateHistoryDisplay() {
      const list = document.getElementById('historyList');
      if (state.history.length === 0) {
        list.innerHTML = '<span style="color: rgba(255,255,255,0.3);">还没有猜测...</span>';
        return;
      }
      list.innerHTML = state.history.map(item => {
        const icon = item.type === 'high' ? '⬆️' : '⬇️';
        return `<span class="history-item ${item.type}">${item.number} ${icon}</span>`;
      }).join('');
    }

    // 更新最佳
    function updateBestDisplay() {
      document.getElementById('best').textContent = state.bestScore !== null ? state.bestScore : '-';
    }

    // 显示提示
    function showHint(text) {
      const el = document.getElementById('hintText');
      el.textContent = '🦔 ' + text;
      el.style.display = 'block';
    }

    // 显示结果
    function showResult(text, type) {
      const el = document.getElementById('resultMessage');
      el.innerHTML = text;
      el.className = `result-message show hg-message-${type}`;
      document.getElementById('hintText').style.display = 'none';
    }

    // 清除结果
    function clearResult() {
      document.getElementById('resultMessage').className = 'result-message';
      document.getElementById('hintText').style.display = 'none';
      updateHistoryDisplay();
    }

    // 切换设置
    function toggleSettings() {
      document.getElementById('settingsPanel').classList.toggle('show');
    }

    // 应用设置
    function applySettings() {
      const newMin = parseInt(document.getElementById('settingMin').value) || 1;
      const newMax = parseInt(document.getElementById('settingMax').value) || 100;
      const newAttempts = parseInt(document.getElementById('settingAttempts').value) || 10;

      if (newMin >= newMax) {
        alert('最小值必须小于最大值！');
        return;
      }
      if (newAttempts < 3 || newAttempts > 20) {
        alert('尝试次数必须在 3-20 之间！');
        return;
      }

      config.min = newMin;
      config.max = newMax;
      config.maxAttempts = newAttempts;

      document.getElementById('settingsPanel').classList.remove('show');
      initGame();
    }

    // 启动
    initGame();
  </script>
</body>
</html>
